<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Crave Kitchen</title>
</head>
<body style="margin:0; font-family:sans-serif; text-align:center;">

    <div style="padding:60px 20px;">
        <h1 style="font-size:28px; margin-bottom:10px;">Admin Login</h1>
        <p style="font-size:15px; color:#666; margin-top:0; margin-bottom:25px;">Enter your password to manage Crave Kitchen</p>

        {% if error %}
        <p style="color:#D62828; font-size:15px; margin-bottom:15px;">{{ error }}</p>
        {% endif %}

        <form method="POST" style="width:95%; max-width:400px; margin:auto;">
            <label style="font-size:15px; color:#555;">Password</label><br>
            <input type="password" name="password" required style="font-size:16px; width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; margin-top:5px; margin-bottom:20px; box-sizing:border-box;">

            <button type="submit" style="width:100%; padding:14px; background-color:#D62828; color:white; border:none; border-radius:8px; font-size:17px; font-weight:bold;">Login</button>
        </form>
    </div>

</body>
</html>
